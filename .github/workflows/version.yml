name: Version Check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - '.github/workflows/version.yml'
      - 'src/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  version-check:
    name: Check version number
    runs-on: ubuntu-latest

    steps:
      - name: Checkout only versioned files
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          sparse-checkout: |
            package.json
            changelog.md

      - name: Fetch main branch
        run: |
          git fetch origin main:refs/remotes/origin/main

      - name: Check version consistency
        run: |
          # Fetch main branch for base commit comparison
          git fetch origin main:refs/remotes/origin/main

          # Get base commit (common ancestor with main)
          BASE_COMMIT=$(git merge-base HEAD origin/main)

          # Get versions
          NEW_VERSION=$(grep '"version"' package.json | head -1 | sed -E 's/.*"version":\s*"([^"]+)".*/\1/')
          OLD_VERSION=$(git show $BASE_COMMIT:package.json | grep '"version"' | head -1 | sed -E 's/.*"version":\s*"([^"]+)".*/\1/')

          if [[ "$NEW_VERSION" == "$OLD_VERSION" ]]; then
            echo "❌ Version number in package.json has not been increased."
            exit 1
          fi

          # Check related files
          if ! git diff --name-only $BASE_COMMIT HEAD | grep -q '^changelog.md$'; then
            echo "❌ changelog.md must be updated when version changes."
            exit 1
          fi

          if ! grep -q "$NEW_VERSION" changelog.md; then
            echo "❌ changelog.md does not contain version $NEW_VERSION"
            exit 1
          fi

          echo "Old version: $OLD_VERSION / New version: $NEW_VERSION"
          echo "✅ Version $NEW_VERSION is consistent across all files"

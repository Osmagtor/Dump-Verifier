name: Build and Package

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'changelog.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  set-version:
    name: Set Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> $GITHUB_ENV
          echo "::set-output name=version::$version"

  build-linux:
    name: Compile and Package (Linux)
    runs-on: ubuntu-latest
    needs: set-version

    strategy:
      matrix:
        architecture: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: /node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          npm pkg delete scripts.prepare
          npm install
        continue-on-error: true

      - name: Clear npm cache (if install fails)
        if: failure()
        run: npm cache clean --force

      - name: Retry Install dependencies
        if: failure()
        run: npm install

      - name: Install required packages for deb and rpm
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot build-essential rpm elfutils

      - name: Compile SCSS and TypeScript
        run: npm run build

      - name: Build packages
        run: npm run release -- --arch=${{ matrix.architecture }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dump-verifier-linux-${{ needs.set-version.outputs.version }}-${{ matrix.architecture }}
          path: |
            out/make/**/*.deb
            out/make/**/*.rpm
          retention-days: 1
          overwrite: true

  build-macos:
    name: Compile and Package (macOS)
    runs-on: macos-latest
    needs: set-version

    strategy:
      matrix:
        architecture: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: /node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          npm pkg delete scripts.prepare
          npm install
        continue-on-error: true

      - name: Clear npm cache (if install fails)
        if: failure()
        run: npm cache clean --force

      - name: Retry Install dependencies
        if: failure()
        run: npm install

      - name: Compile SCSS and TypeScript
        run: npm run build

      - name: Build packages
        run: npm run release -- --arch=${{ matrix.architecture }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dump-verifier-macos-${{ needs.set-version.outputs.version }}-${{ matrix.architecture }}
          path: out/make/**/*.zip
          retention-days: 1
          overwrite: true

  build-windows:
    name: Compile and Package (Windows)
    runs-on: windows-latest
    needs: set-version

    strategy:
      matrix:
        architecture: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: /node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          npm pkg delete scripts.prepare
          npm install
        continue-on-error: true

      - name: Clear npm cache (if install fails)
        if: failure()
        run: npm cache clean --force

      - name: Retry Install dependencies
        if: failure()
        run: npm install

      - name: Compile SCSS and TypeScript
        run: npm run build

      - name: Build packages
        run: npm run release -- --arch=${{ matrix.architecture }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dump-verifier-windows-${{ needs.set-version.outputs.version }}-${{ matrix.architecture }}
          path: out/make/**/*.exe
          retention-days: 1
          overwrite: true

  create-release:
    name: Create GitHub Release
    needs: [set-version, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: dump-verifier-linux-${{ needs.set-version.outputs.version }}-x64
          path: artifacts/linux-x64

      - name: Download Linux arm64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: dump-verifier-linux-${{ needs.set-version.outputs.version }}-arm64
          path: artifacts/linux-arm64

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: dump-verifier-macos-${{ needs.set-version.outputs.version }}-x64
          path: artifacts/macos-x64

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: dump-verifier-macos-${{ needs.set-version.outputs.version }}-arm64
          path: artifacts/macos-arm64

      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: dump-verifier-windows-${{ needs.set-version.outputs.version }}-x64
          path: artifacts/windows-x64

      - name: Download Windows arm64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: dump-verifier-windows-${{ needs.set-version.outputs.version }}-arm64
          path: artifacts/windows-arm64

      - name: Check that the artifacts are present
        run: |
          FILES=$(find artifacts -type f)

          if [ -z "$FILES" ]; then
            echo "No artifacts found!"
            exit 1
          fi

          echo "Found artifacts:"
          echo "$FILES"

      - name: Extract changelog for release
        id: extract_changelog
        run: |
          changelog=$(awk '/# v2.0.2/{flag=1; next} /^#/{flag=0} flag' changelog.md)
          echo "$changelog"
          echo "changelog<<EOF" >> $GITHUB_ENV
          echo "$changelog" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.set-version.outputs.version }}
          name: v${{ needs.set-version.outputs.version }}
          body: ${{ env.changelog }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            artifacts/linux-arm64/**/*.{deb,rpm}
            artifacts/linux-x64/**/*.{deb,rpm}
            artifacts/macos-arm64/**/*.zip
            artifacts/macos-x64/**/*.zip
            artifacts/windows-arm64/**/*.exe
            artifacts/windows-x64/**/*.exe

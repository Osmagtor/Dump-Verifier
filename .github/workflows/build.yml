name: Build and Package

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - 'src/**'
      - 'changelog.md'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Compile and Package (Linux)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        architecture: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: /node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          npm pkg delete scripts.prepare
          npm install

      - name: Install required packages for deb and rpm
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot build-essential rpm rpm-build flatpak-builder eu-strip
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Compile SCSS and TypeScript
        run: npm run build

      - name: Build packages
        run: sudo npm run release -- --arch=${{ matrix.architecture }}

      - name: Get version from package.json
        id: get_version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dump-verifier-linux-${{ env.version }}-${{ matrix.architecture }}
          path: out/make/**/*.rpm
          retention-days: 1
          overwrite: true

  build-macos:
    name: Compile and Package (macOS)
    runs-on: macos-latest

    strategy:
      matrix:
        architecture: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: /node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          npm pkg delete scripts.prepare
          npm install

      - name: Compile SCSS and TypeScript
        run: npm run build

      - name: Build packages
        run: npm run release -- --arch=${{ matrix.architecture }}

      - name: Get version from package.json
        id: get_version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dump-verifier-macos-${{ env.version }}-${{ matrix.architecture }}
          path: out/make/**/*.zip
          retention-days: 1
          overwrite: true

  build-windows:
    name: Compile and Package (Windows)
    runs-on: windows-latest

    strategy:
      matrix:
        architecture: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: /node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          npm pkg delete scripts.prepare
          npm install

      - name: Compile SCSS and TypeScript
        run: npm run build

      - name: Build packages
        run: npm run release -- --arch=${{ matrix.architecture }}

      - name: Get version from package.json
        id: get_version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dump-verifier-windows-${{ env.version }}-${{ matrix.architecture }}
          path: out/make/**/*.exe
          retention-days: 1
          overwrite: true

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Get version from package.json
        id: get_version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> $GITHUB_ENV

      - name: Extract changelog for release
        id: extract_changelog
        run: |
          version=$(node -p "require('./package.json').version")
          changelog=$(awk "/# v$version/,/^$/" changelog.md | sed '1d;$d')
          echo "changelog<<EOF" >> $GITHUB_ENV
          echo "$changelog" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ env.version }}
          release_name: Release v${{ env.version }}
          body: ${{ env.changelog }}
          draft: false
          prerelease: false

      - name: Upload Linux Artifacts
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: out/make/dump-verifier-linux-${{ env.version }}-*.rpm
          asset_name: dump-verifier-linux-${{ env.version }}.zip
          asset_content_type: application/zip

      - name: Upload macOS Artifacts
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: out/make/dump-verifier-macos-${{ env.version }}-*.zip
          asset_name: dump-verifier-macos-${{ env.version }}.zip
          asset_content_type: application/zip

      - name: Upload Windows Artifacts
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: out/make/dump-verifier-windows-${{ env.version }}-*.exe
          asset_name: dump-verifier-windows-${{ env.version }}.zip
          asset_content_type: application/zip
